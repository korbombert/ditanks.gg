<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico.png">
    <title>403 - Access Denied</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Ubuntu', sans-serif; user-select: none; box-sizing: border-box; }
        body { 
            margin: 0; overflow: hidden; 
            background-color: #cdcdcd; 
            background-image: 
                linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 50px 50px;
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        .error-box { 
            background: #eee; padding: 40px 30px; border-radius: 10px; 
            border: 5px solid #555; text-align: center; 
            width: 90%; max-width: 380px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .error-code { font-size: 64px; font-weight: bold; color: #be7ff5; margin: 0; text-shadow: 2px 2px 0px #8559ab; line-height: 1; }
        .error-title { font-size: 22px; color: #333; margin: 10px 0 15px; font-weight: bold; }
        .error-desc { font-size: 15px; color: #555; margin-bottom: 25px; line-height: 1.5; }
        
        .btn { 
            background: #00b2e1; color: white; border: none; padding: 12px 24px; 
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; 
            border-bottom: 4px solid #0085a8; transition: 0.1s; text-decoration: none; 
            display: inline-block; width: 85%;
        }
        .btn:active { transform: translateY(2px); border-bottom-width: 2px; }
        
        .tank-svg { margin-bottom: 15px; animation: shake 1.5s ease-in-out infinite; }
        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-3px) rotate(-2deg); } 
            75% { transform: translateX(3px) rotate(2deg); } 
        }
    </style>
</head>
<body>
    <div class="error-box">
        <svg class="tank-svg" width="100" height="100" viewBox="0 0 100 100">
            <g transform="translate(50, 50) rotate(-90)">
                <rect x="0" y="-9" width="43" height="18" fill="#999" stroke="#6b6b6b" stroke-width="4" stroke-linejoin="round"/>
            </g>
            <circle cx="50" cy="50" r="24" fill="#be7ff5" stroke="#8559ab" stroke-width="4"/>
        </svg>

        <h1 class="error-code">403</h1>
        <h2 class="error-title">Access Denied.</h2>
        <a href="/" class="btn">Return to Menu</a>
    </div>
</body>
</html>
