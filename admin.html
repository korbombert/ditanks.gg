<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ditanks Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Ubuntu', sans-serif; user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #b1b1b1; padding: 40px 20px; color: #333; }
        
        .container { 
            max-width: 1000px; margin: 0 auto; 
            background: #eee; padding: 30px; border-radius: 10px; 
            border: 5px solid #555; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; margin-top: 0; font-size: 32px; color: #333; text-shadow: 2px 2px 0px #fff; }
        h2 { border-bottom: 3px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 4px solid #ccc; padding-bottom: 10px; }
        .tab-btn {
            background: #bbb; color: white; padding: 10px 20px; border: none; border-radius: 5px; 
            font-size: 16px; font-weight: bold; cursor: pointer; border-bottom: 4px solid #999;
        }
        .tab-btn.active { background: #00b2e1; border-bottom-color: #0085a8; transform: translateY(2px); border-bottom-width: 2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Table Styling */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 10px; }
        th { text-align: left; padding: 10px; color: #666; font-size: 14px; text-transform: uppercase; }
        tr { background: #333; color: white; border-radius: 8px; }
        td { padding: 12px; border-top: 3px solid #222; border-bottom: 6px solid #111; }
        td:first-child { border-left: 3px solid #222; border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        td:last-child { border-right: 3px solid #222; border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

        /* Buttons */
        .btn { 
            border: none; border-radius: 5px; cursor: pointer; 
            font-weight: bold; transition: 0.1s; padding: 10px 20px;
            color: white; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn:active { transform: translateY(2px); border-bottom-width: 2px !important; }
        .btn-blue { background: #00b2e1; border-bottom: 4px solid #0085a8; }
        .btn-green { background: #4CAF50; border-bottom: 4px solid #388E3C; }
        .btn-kick { background: #f0a824; border-bottom: 4px solid #c88414; margin-right: 5px; }
        .btn-ban { background: #f14e54; border-bottom: 4px solid #c83d42; }

        /* Forms */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; padding: 10px; border-radius: 5px; border: 2px solid #ccc; font-family: inherit; font-size: 14px;
        }
        
        .server-box { background: #333; padding: 20px; border-radius: 8px; text-align: center; border: 3px solid #222; }

        .room-card { 
            background: #333; padding: 15px; border-radius: 8px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; border: 3px solid #222; border-bottom: 6px solid #111; color: white;
        }
        .room-card:hover { transform: scale(1.01); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ ADMIN DASHBOARD</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rooms', this)">Rooms & Players</button>
            <button class="tab-btn" onclick="switchTab('bans', this)">Bans</button>
            <button class="tab-btn" onclick="switchTab('changelogs', this)">Changelogs</button>
            <button class="tab-btn" onclick="switchTab('server', this)">Server Controls</button>
        </div>

        <div id="tab-rooms" class="tab-content active">
            <div id="view-rooms">
                <div id="room-list">Loading rooms...</div>
            </div>
            <div id="view-players" style="display:none;">
                <button class="btn btn-blue" onclick="document.getElementById('view-players').style.display='none'; document.getElementById('view-rooms').style.display='block'; loadRooms();" style="margin-bottom: 15px;">← BACK TO ROOMS</button>
                <h2 id="room-title" style="margin-top:0;">Room Players</h2>
                <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                    <button class="btn btn-kick" onclick="massAction('kick')">KICK SELECTED</button>
                    <button class="btn btn-ban" onclick="massAction('ban')">BAN SELECTED</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                            <th>Network</th>
                            <th>Name</th>
                            <th>Score</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="player-list"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-bans" class="tab-content">
            <h2>Banned IPs</h2>
            <table>
                <thead>
                    <tr>
                        <th>IP Hash</th>
                        <th>Date</th>
                        <th>Reason</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ban-list"></tbody>
            </table>
        </div>

        <div id="tab-changelogs" class="tab-content">
            <h2>Publish Changelog</h2>
            <div style="background:#ddd; padding:15px; border-radius:8px; border:2px solid #ccc; margin-bottom: 20px;">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="cl-title" placeholder="e.g., Update v1.0.5">
                </div>
                <div class="form-group">
                    <label>Description (Short)</label>
                    <input type="text" id="cl-desc" placeholder="Brief summary of changes...">
                </div>
                <div class="form-group">
                    <label>Markdown (Full Notes)</label>
                    <textarea id="cl-markdown" rows="5" placeholder="- Added new tank&#10;- Fixed bugs"></textarea>
                </div>
                <div class="form-group">
                    <label>Sort Order (Higher = Shows first)</label>
                    <input type="number" id="cl-sort" value="10">
                </div>
                <button class="btn btn-green" onclick="postChangelog()">Publish Changelog</button>
            </div>

            <h2>Existing Changelogs</h2>
            <table>
                <thead><tr><th>Title</th><th>Date</th><th>Sort</th><th>Actions</th></tr></thead>
                <tbody id="changelog-list"></tbody>
            </table>
        </div>

        <div id="tab-server" class="tab-content">
            <h2>Create Server Instance</h2>
            <div style="background:#ddd; padding:15px; border-radius:8px; border:2px solid #ccc; margin-bottom: 20px; display:flex; gap:10px; align-items:flex-end;">
                <div class="form-group" style="margin-bottom:0; flex:1;">
                    <label>Server ID (e.g. FFA-S3)</label>
                    <input type="text" id="new-server-id" placeholder="FFA-S3">
                </div>
                <div class="form-group" style="margin-bottom:0; flex:1;">
                    <label>Game Mode</label>
                    <select id="new-server-mode" style="width: 100%; padding: 10px; border-radius: 5px; border: 2px solid #ccc; font-family: inherit; font-size: 14px;">
                        <option value="FFA">FFA</option>
                        <option value="2TDM">2 Teams</option>
                        <option value="4TDM">4 Teams</option>
                    </select>
                </div>
                <button class="btn btn-green" onclick="createServer()">CREATE SERVER</button>
            </div>

            <h2>Server Management</h2>
            <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                <button class="btn btn-green" onclick="massServerAction('boot')">BOOT SELECTED</button>
                <button class="btn btn-kick" onclick="massServerAction('restart')">RESTART SELECTED</button>
                <button class="btn btn-ban" onclick="massServerAction('kill')">KILL SELECTED</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAllServers" onclick="toggleSelectAllServers()"></th>
                        <th>Server ID</th>
                        <th>Mode</th>
                        <th>Status</th>
                        <th>Players</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="server-list"></tbody>
            </table>
        </div>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let authToken = urlParams.get('token') || localStorage.getItem('sessionToken') || '';
        if (authToken) localStorage.setItem('sessionToken', authToken);

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authToken}`
            };
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            btn.classList.add('active');

            if (tabId === 'rooms') loadRooms();
            if (tabId === 'bans') loadBans();
            if (tabId === 'changelogs') loadChangelogs();
            if (tabId === 'server') loadServers();
        }

        let currentRoomId = null;

        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = { method, headers: getHeaders() };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(endpoint, options);
            if (res.status === 401 || res.status === 403) {
                alert("Unauthorized! Redirecting to home.");
                window.location.href = '/';
                throw new Error("Auth failed");
            }
            return res.json();
        }

        async function loadRooms() {
            document.getElementById('view-players').style.display = 'none';
            document.getElementById('view-rooms').style.display = 'block';
            const rooms = await apiCall('/api/admin/rooms');
            
            document.getElementById('room-list').innerHTML = rooms.map(r => `
                <div class="room-card" onclick="loadPlayers('${r.id}')">
                    <div>
                        <strong style="font-size: 18px; color: #00b2e1;">${r.id}</strong>
                        <span style="color: #888; margin-left: 10px; font-size: 14px;">${r.mode}</span>
                    </div>
                    <div style="font-weight: bold; font-size: 18px;">${r.players} 👤</div>
                </div>
            `).join('');
        }

        async function loadPlayers(roomId) {
            currentRoomId = roomId;
            document.getElementById('view-rooms').style.display = 'none';
            document.getElementById('view-players').style.display = 'block';
            document.getElementById('room-title').innerText = `Players in ${roomId}`;

            const data = await apiCall(`/api/admin/rooms/${roomId}`);
            const tbody = document.getElementById('player-list');
            
            tbody.innerHTML = data.players.map(p => {
                const flagHtml = p.country !== 'xx' 
                    ? `<img src="https://flagcdn.com/w20/${p.country}.png" alt="${p.country}" title="${p.country.toUpperCase()}" style="vertical-align: middle; border-radius: 2px; margin-right: 5px; box-shadow: 0 0 2px rgba(0,0,0,0.5);">` 
                    : `🏳️ `;
                return `
                <tr>
                    <td style="text-align:center;"><input type="checkbox" class="player-chk" data-id="${p.id}" data-hash="${p.ipHash}"></td>
                    <td style="color:#aaa; font-family:monospace;">${flagHtml}${p.ipHash}</td>
                    <td style="color:${p.team === 1 ? '#00b2e1' : (p.team === 2 ? '#f14e54' : 'white')}">${p.name || "Unnamed"}</td>
                    <td style="font-weight: bold; color: #40f252;">${p.score.toLocaleString()}</td>
                    <td>
                        <button class="btn btn-blue" style="padding: 5px 10px; font-size: 12px; margin-right: 5px;" onclick="takeAction('rename', ${p.id}, '${p.ipHash}')">RENAME</button>
                        <button class="btn btn-kick" style="padding: 5px 10px; font-size: 12px;" onclick="takeAction('kick', ${p.id}, '${p.ipHash}')">KICK</button>
                        <button class="btn btn-ban" style="padding: 5px 10px; font-size: 12px;" onclick="takeAction('ban', ${p.id}, '${p.ipHash}')">BAN</button>
                    </td>
                </tr>
                `;
            }).join('');
            
            if (data.players.length === 0) tbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">No players</td></tr>`;
        }

        async function takeAction(action, playerId, ipHash) {
            let reason = "";
            let newName = "";
            if (action === 'ban') {
                reason = prompt(`Are you sure you want to BAN ${ipHash}? Enter reason:`);
                if (reason === null) return; 
            }
            if (action === 'rename') {
                newName = prompt("Enter new name (leave blank to clear):", "Player");
                if (newName === null) return;
            }
            await apiCall('/api/admin/action', 'POST', { action, roomId: currentRoomId, playerId, ipHash, reason, newName });
            loadPlayers(currentRoomId);
        }

        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.player-chk').forEach(c => c.checked = checked);
        }

        async function massAction(action) {
            const selected = Array.from(document.querySelectorAll('.player-chk:checked'));
            if (selected.length === 0) return alert("Select at least one player.");
            
            let reason = "";
            if (action === 'ban') {
                reason = prompt(`Banning ${selected.length} players. Enter reason:`);
                if (reason === null) return;
            }

            for (let chk of selected) {
                await apiCall('/api/admin/action', 'POST', { 
                    action, roomId: currentRoomId, playerId: parseInt(chk.dataset.id), ipHash: chk.dataset.hash, reason 
                });
            }
            loadPlayers(currentRoomId);
        }

        async function loadBans() {
            const bans = await apiCall('/api/admin/bans');
            document.getElementById('ban-list').innerHTML = bans.map(b => `
                <tr>
                    <td style="font-family:monospace; color:#aaa;">${b.ip_hash}</td>
                    <td>${new Date(b.timestamp).toLocaleString()}</td>
                    <td>${b.reason || 'No reason'}</td>
                    <td><button class="btn btn-green" style="padding: 5px 10px; font-size: 12px;" onclick="unban('${b.ip_hash}')">UNBAN</button></td>
                </tr>
            `).join('');
            if(bans.length === 0) document.getElementById('ban-list').innerHTML = '<tr><td colspan="4" style="text-align:center;">No banned IPs</td></tr>';
        }

        async function unban(ipHash) {
            if(!confirm("Lift ban for " + ipHash + "?")) return;
            await apiCall('/api/admin/unban', 'POST', { ipHash });
            loadBans();
        }

        async function loadChangelogs() {
            const logs = await apiCall('/api/changelogs');
            document.getElementById('changelog-list').innerHTML = logs.map(l => `
                <tr>
                    <td style="font-weight:bold;">${l.title}</td>
                    <td>${new Date(l.date).toLocaleDateString()}</td>
                    <td>${l.sort_order}</td>
                    <td><button class="btn btn-ban" style="padding: 5px 10px; font-size: 12px;" onclick="deleteChangelog(${l.id})">DELETE</button></td>
                </tr>
            `).join('');
        }

        async function loadServers() {
            const servers = await apiCall('/api/admin/server_instances');
            document.getElementById('server-list').innerHTML = servers.map(s => `
                <tr>
                    <td style="text-align:center;"><input type="checkbox" class="server-chk" value="${s.id}"></td>
                    <td style="font-weight:bold; color:#00b2e1;">${s.id}</td>
                    <td>${s.mode}</td>
                    <td style="font-weight:bold; color:${s.status === 'running' ? '#4CAF50' : '#f14e54'};">${s.status.toUpperCase()}</td>
                    <td style="font-weight: bold;">${s.players} 👤</td>
                    <td>
                        ${s.status === 'stopped' 
                            ? `<button class="btn btn-green" style="padding: 5px 10px; font-size: 12px;" onclick="singleServerAction('${s.id}', 'boot')">BOOT</button>
                               <button class="btn btn-ban" style="padding: 5px 10px; font-size: 12px; margin-left: 5px;" onclick="singleServerAction('${s.id}', 'delete')">DELETE</button>`
                            : `<button class="btn btn-kick" style="padding: 5px 10px; font-size: 12px;" onclick="singleServerAction('${s.id}', 'restart')">RESTART</button>
                               <button class="btn btn-ban" style="padding: 5px 10px; font-size: 12px; margin-left: 5px;" onclick="singleServerAction('${s.id}', 'kill')">KILL</button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        async function createServer() {
            const id = document.getElementById('new-server-id').value.trim();
            const mode = document.getElementById('new-server-mode').value;
            if (!id) return alert("Please enter a Server ID.");
            try {
                const result = await apiCall('/api/admin/server_instances/create', 'POST', { id, mode });
                if (result.error) throw new Error(result.error);
                document.getElementById('new-server-id').value = '';
                loadServers();
            } catch (err) {
                alert(err.message || "Failed to create server");
            }
        }

        function toggleSelectAllServers() {
            const checked = document.getElementById('selectAllServers').checked;
            document.querySelectorAll('.server-chk').forEach(c => c.checked = checked);
        }

        async function massServerAction(action) {
            const selected = Array.from(document.querySelectorAll('.server-chk:checked')).map(c => c.value);
            if (selected.length === 0) return alert("Select at least one server.");
            if (!confirm(`Are you sure you want to ${action.toUpperCase()} ${selected.length} servers?`)) return;
            
            await apiCall('/api/admin/server_instances/action', 'POST', { action, serverIds: selected });
            loadServers();
        }

        async function singleServerAction(id, action) {
            if (!confirm(`Are you sure you want to ${action.toUpperCase()} server ${id}?`)) return;
            await apiCall('/api/admin/server_instances/action', 'POST', { action, serverIds: [id] });
            loadServers();
        }

        async function postChangelog() {
            const body = {
                title: document.getElementById('cl-title').value,
                description: document.getElementById('cl-desc').value,
                markdown: document.getElementById('cl-markdown').value,
                sort_order: parseInt(document.getElementById('cl-sort').value) || 0
            };
            if(!body.title) return alert("Title is required!");
            await apiCall('/api/admin/changelogs', 'POST', body);
            alert("Published!");
            loadChangelogs();
        }

        async function deleteChangelog(id) {
            if(!confirm("Delete this changelog?")) return;
            await apiCall('/api/admin/changelogs/' + id, 'DELETE');
            loadChangelogs();
        }

        loadRooms();
    </script>
</body>
</html>
