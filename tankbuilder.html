<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tank Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    user-select:none;
    font-family:'Ubuntu',sans-serif;
}

body{
    margin:0;
    overflow:hidden;
    background:#b1b1b1;
    color:#333;
}

#bgCanvas{
    position:fixed;
    inset:0;
    z-index:-1;
}

#app{
    display:flex;
    height:100vh;
    gap:20px;
    padding:20px;
}

.panel{
    background:#eee;
    border:5px solid #555;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

#leftPanel{
    width:360px;
    padding:18px;
    overflow-y:auto;
}

#centerPanel{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

#canvasContainer{
    flex:1;
    position:relative;
    margin:15px;
    background:#d5d5d5;
    border:5px solid #555;
    border-radius:12px;
    overflow:hidden;
}

#previewCanvas{
    width:100%;
    height:100%;
    display:block;
    cursor:grab;
}

#toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:15px;
    border-bottom:4px solid #ccc;
}

.btn{
    background:#00b2e1;
    border:none;
    border-bottom:4px solid #0085a8;
    color:white;
    padding:10px 16px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    transition:0.08s;
}

.btn:hover{
    filter:brightness(1.05);
}

.btn:active{
    transform:translateY(2px);
    border-bottom-width:2px;
}

.btn.red{
    background:#f14e54;
    border-bottom-color:#c83d42;
}

.btn.green{
    background:#4CAF50;
    border-bottom-color:#388E3C;
}

.btn.gray{
    background:#777;
    border-bottom-color:#555;
}

.sectionTitle{
    font-size:22px;
    font-weight:bold;
    margin-bottom:12px;
    border-bottom:4px solid #ccc;
    padding-bottom:8px;
}

.inputRow{
    margin-bottom:12px;
}

.inputRow label{
    display:block;
    margin-bottom:5px;
    font-size:13px;
    font-weight:bold;
}

.inputRow input{
    width:100%;
    padding:10px;
    border:3px solid #ccc;
    border-bottom:5px solid #bbb;
    border-radius:6px;
    font-size:15px;
    font-weight:bold;
}

.inputRow input:focus{
    outline:none;
    border-color:#00b2e1;
    border-bottom-color:#0085a8;
}

#barrelList{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:10px;
}

.barrelCard{
    background:#333;
    color:white;
    border:3px solid #222;
    border-bottom:5px solid #111;
    border-radius:8px;
    padding:10px;
    cursor:pointer;
}

.barrelCard.active{
    border-color:#00b2e1;
}

.barrelHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
    font-weight:bold;
}

.barrelMini{
    font-size:12px;
    opacity:0.85;
}

#editor{
    margin-top:15px;
    padding-top:15px;
    border-top:4px solid #ccc;
}

.grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.smallLabel{
    font-size:11px;
    font-weight:bold;
    margin-bottom:4px;
}

.smallInput{
    width:100%;
    padding:8px;
    border-radius:6px;
    border:3px solid #ccc;
    border-bottom:4px solid #bbb;
    font-weight:bold;
}

.smallInput:focus{
    outline:none;
    border-color:#00b2e1;
    border-bottom-color:#0085a8;
}

#exportArea{
    width:100%;
    height:240px;
    resize:none;
    border-radius:10px;
    border:4px solid #555;
    padding:10px;
    font-family:monospace;
    background:#222;
    color:#00ff99;
    font-size:13px;
}

#topInfo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 15px 0;
}

.infoBadge{
    background:#333;
    color:white;
    border:3px solid #222;
    border-bottom:4px solid #111;
    border-radius:8px;
    padding:8px 12px;
    font-size:14px;
    font-weight:bold;
}

@media(max-width:1100px){
    #app{
        flex-direction:column;
    }

    #leftPanel{
        width:100%;
        height:50vh;
    }
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<div id="app">

    <div id="leftPanel" class="panel">

        <div class="sectionTitle">Tank Builder</div>

        <div class="inputRow">
            <label>Tank Name</label>
            <input id="tankName" value="My Tank">
        </div>

        <div style="display:flex;gap:10px;">
            <button class="btn green" id="addBarrelBtn">+ Add Barrel</button>
            <button class="btn red" id="deleteBarrelBtn">Delete</button>
        </div>

        <div id="barrelList"></div>

        <div id="editor">
            <div class="sectionTitle" style="font-size:18px;">
                Barrel Editor
            </div>

            <div class="grid2" id="editorGrid"></div>
        </div>

    </div>

    <div id="centerPanel" class="panel">

        <div id="topInfo">
            <div class="infoBadge">
                Drag barrels with mouse
            </div>

            <div class="infoBadge">
                Mouse Wheel = Rotate
            </div>
        </div>

        <div id="toolbar">
            <button class="btn" id="centerBtn">Center Tank</button>
            <button class="btn green" id="exportBtn">Export Tank</button>
            <button class="btn gray" id="loadExampleBtn">Load Example</button>
        </div>

        <div id="canvasContainer">
            <canvas id="previewCanvas"></canvas>
        </div>

        <div style="padding:15px;">
            <textarea id="exportArea" readonly></textarea>
        </div>

    </div>

</div>

<script>
const previewCanvas = document.getElementById('previewCanvas');
const ctx = previewCanvas.getContext('2d');

const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');

let selectedBarrel = 0;

function degToRad(d){
    return d * Math.PI / 180;
}

function radToDeg(r){
    return r * 180 / Math.PI;
}

function angleToCode(rad){

    const pi = Math.PI;

    const values = [
        [0, '0'],
        [pi/6, 'Math.PI/6'],
        [pi/4, 'Math.PI/4'],
        [pi/3, 'Math.PI/3'],
        [pi/2, 'Math.PI/2'],
        [2*pi/3, '2*Math.PI/3'],
        [3*pi/4, '3*Math.PI/4'],
        [5*pi/6, '5*Math.PI/6'],
        [pi, 'Math.PI'],
        [-pi/6, '-Math.PI/6'],
        [-pi/4, '-Math.PI/4'],
        [-pi/3, '-Math.PI/3'],
        [-pi/2, '-Math.PI/2'],
        [-2*pi/3, '-2*Math.PI/3'],
        [-3*pi/4, '-3*Math.PI/4'],
        [-5*pi/6, '-5*Math.PI/6'],
    ];

    for(const [val,str] of values){
        if(Math.abs(rad - val) < 0.001){
            return str;
        }
    }

    return Number(rad.toFixed(4));
}

const defaultBarrel = () => ({
    x:0,
    y:0,
    w:18,
    l:1.8,
    angle:0,
    spread:0,
    dmg:1,
    spd:1,
    rel:1,
    size:1,
    delay:0
});

let tank = {
    name:'My Tank',
    barrels:[defaultBarrel()]
};

const properties = [
    'x','y','w','w2','l',
    'angle',
    'spread','dmg','spd',
    'rel','size','delay'
];

const editorGrid = document.getElementById('editorGrid');

properties.forEach(prop=>{

    const wrap = document.createElement('div');

    wrap.innerHTML = `
        <div class="smallLabel">
            ${prop}${prop === 'angle' ? ' (deg)' : ''}
        </div>

        <input class="smallInput"
               type="number"
               step="0.1"
               id="prop_${prop}">
    `;

    editorGrid.appendChild(wrap);

    wrap.querySelector('input').addEventListener('input',e=>{

        let b = tank.barrels[selectedBarrel];
        if(!b) return;

        let val = parseFloat(e.target.value);

        if(isNaN(val)){
            delete b[prop];
        }else{

            if(prop === 'angle'){
                b[prop] = degToRad(val);
            }else{
                b[prop] = val;
            }
        }

        refreshBarrelList();
    });
});

function loadEditor(){

    let b = tank.barrels[selectedBarrel];
    if(!b) return;

    properties.forEach(prop=>{

        const input = document.getElementById('prop_'+prop);

        if(prop === 'angle'){
            input.value = Number(radToDeg(b[prop] || 0).toFixed(2));
        }else{
            input.value = b[prop] ?? '';
        }
    });
}

function refreshBarrelList(){

    const list = document.getElementById('barrelList');
    list.innerHTML = '';

    tank.barrels.forEach((b,i)=>{

        const card = document.createElement('div');

        card.className =
            'barrelCard' +
            (i === selectedBarrel ? ' active' : '');

        card.innerHTML = `
            <div class="barrelHeader">
                <span>Barrel ${i+1}</span>
                <span class="barrelMini">
                    ${Math.round(radToDeg(b.angle || 0))}°
                </span>
            </div>

            <div class="barrelMini">
                x:${b.x || 0}
                y:${b.y || 0}
                w:${b.w || 18}
                l:${b.l || 1.8}
            </div>
        `;

        card.onclick = ()=>{

            selectedBarrel = i;

            refreshBarrelList();
            loadEditor();
        };

        list.appendChild(card);
    });
}
document.getElementById('addBarrelBtn').onclick = ()=>{

    tank.barrels.push(defaultBarrel());

    selectedBarrel = tank.barrels.length-1;

    refreshBarrelList();
    loadEditor();
};

document.getElementById('deleteBarrelBtn').onclick = ()=>{

    if(tank.barrels.length <= 1) return;

    tank.barrels.splice(selectedBarrel,1);

    selectedBarrel =
        Math.max(0,selectedBarrel-1);

    refreshBarrelList();
    loadEditor();
};

/* DUPLICATE BUTTON */

const dupBtn = document.createElement('button');

dupBtn.className = 'btn';
dupBtn.innerText = 'Duplicate';

document.getElementById('deleteBarrelBtn')
.parentNode.appendChild(dupBtn);

dupBtn.onclick = ()=>{

    const copy = JSON.parse(
        JSON.stringify(
            tank.barrels[selectedBarrel]
        )
    );

    copy.x += 10;
    copy.y += 10;

    tank.barrels.splice(
        selectedBarrel+1,
        0,
        copy
    );

    selectedBarrel++;

    refreshBarrelList();
    loadEditor();
};

document.getElementById('tankName')
.addEventListener('input',e=>{
    tank.name = e.target.value;
});

document.getElementById('centerBtn').onclick = ()=>{

    tank.barrels.forEach(b=>{
        b.x = 0;
        b.y = 0;
    });

    loadEditor();
};

document.getElementById('exportBtn').onclick = ()=>{
    exportTank();
};

/* IMPORT BUTTON */

const importBtn = document.createElement('button');

importBtn.className = 'btn gray';
importBtn.innerText = 'Import Tank';

document.getElementById('toolbar')
.appendChild(importBtn);

importBtn.onclick = ()=>{

    const text = prompt(
        'Paste tank object here'
    );

    if(!text) return;

    try{

        const wrapped = '(' + text + ')';

        const obj = eval(wrapped);

        const tankName =
            Object.keys(obj)[0];

        const tankData =
            obj[tankName];

        tank.name = tankName;

        tank.barrels =
            JSON.parse(
                JSON.stringify(
                    tankData.barrels
                )
            );

        document.getElementById(
            'tankName'
        ).value = tank.name;

        selectedBarrel = 0;

        refreshBarrelList();
        loadEditor();

        alert('Imported successfully.');

    }catch(err){

        console.error(err);

        alert(
            'Import failed. Check syntax.'
        );
    }
};

function exportTank(){

    function stringifyBarrel(b, client=false){

        let entries = [];

        for(let key in b){

            if(client){

                if([
                    'spread',
                    'dmg',
                    'spd',
                    'rel',
                    'size',
                    'delay'
                ].includes(key)){
                    continue;
                }
            }

            let val = b[key];

            if(key === 'angle'){
                val = angleToCode(val);
            }

            entries.push(`${key}:${val}`);
        }

        return `{${entries.join(', ')}}`;
    }

    const server = `
'${tank.name}': {
    barrels: [
${tank.barrels.map(
b=>'        '+
stringifyBarrel(b)
).join(',\n')}
    ]
},
`;

    const client = `
'${tank.name}': {
    barrels: [
${tank.barrels.map(
b=>'        '+
stringifyBarrel(b,true)
).join(',\n')}
    ]
},
`;

    document.getElementById(
        'exportArea'
    ).value =
`// SERVER
${server}

// CLIENT
${client}`;
}

function resize(){

    bgCanvas.width = innerWidth;
    bgCanvas.height = innerHeight;

    previewCanvas.width =
        previewCanvas.parentElement.clientWidth;

    previewCanvas.height =
        previewCanvas.parentElement.clientHeight;
}

window.addEventListener('resize',resize);

resize();

function drawBackground(){

    bgCtx.fillStyle = '#b1b1b1';

    bgCtx.fillRect(
        0,0,
        bgCanvas.width,
        bgCanvas.height
    );

    bgCtx.strokeStyle =
        'rgba(0,0,0,0.06)';

    bgCtx.lineWidth = 1;

    for(let x=0;x<bgCanvas.width;x+=50){

        bgCtx.beginPath();

        bgCtx.moveTo(x,0);

        bgCtx.lineTo(
            x,
            bgCanvas.height
        );

        bgCtx.stroke();
    }

    for(let y=0;y<bgCanvas.height;y+=50){

        bgCtx.beginPath();

        bgCtx.moveTo(0,y);

        bgCtx.lineTo(
            bgCanvas.width,
            y
        );

        bgCtx.stroke();
    }
}

drawBackground();

function drawTank() {

    ctx.clearRect(
        0,
        0,
        previewCanvas.width,
        previewCanvas.height
    );

    const cx = previewCanvas.width / 2;
    const cy = previewCanvas.height / 2;

    const tankRadius = 35;

    tank.barrels.forEach((b, i) => {

    ctx.save();

    ctx.translate(cx, cy);

    // EXACT CLIENT LOGIC
    ctx.rotate(b.angle || 0);

    ctx.translate(
        b.x || 0,
        b.y || 0
    );

    ctx.fillStyle =
        i === selectedBarrel
            ? '#95e7ff'
            : '#999';

    ctx.strokeStyle = '#555';
    ctx.lineWidth = 5;

    const width = b.w || 18;
    const length = tankRadius * (b.l || 1.8);

    if (b.w2) {

        ctx.beginPath();

        ctx.moveTo(0, -width/2);

        ctx.lineTo(length, -(b.w2/2));

        ctx.lineTo(length, (b.w2/2));

        ctx.lineTo(0, width/2);

        ctx.closePath();

        ctx.fill();
        ctx.stroke();

    } else {

        ctx.fillRect(
            0,
            -width/2,
            length,
            width
        );

        ctx.strokeRect(
            0,
            -width/2,
            length,
            width
        );
    }

    ctx.restore();
});

    // Draw tank body
    ctx.beginPath();

    ctx.arc(
        cx,
        cy,
        tankRadius,
        0,
        Math.PI * 2
    );

    ctx.fillStyle = '#00b2e1';

    ctx.fill();

    ctx.lineWidth = 6;

    ctx.strokeStyle = '#0085a8';

    ctx.stroke();
}

let dragging = false;

previewCanvas.addEventListener(
'mousedown',e=>{

    const rect =
        previewCanvas
        .getBoundingClientRect();

    const mx =
        e.clientX - rect.left;

    const my =
        e.clientY - rect.top;

    const cx =
        previewCanvas.width/2;

    const cy =
        previewCanvas.height/2;

    for(
        let i=tank.barrels.length-1;
        i>=0;
        i--
    ){

        let b = tank.barrels[i];

        let dx =
            mx - (cx+b.x);

        let dy =
            my - (cy+b.y);

        if(
            Math.hypot(dx,dy)
            < 35
        ){

            selectedBarrel = i;

            refreshBarrelList();
            loadEditor();

            dragging = true;

            break;
        }
    }
});

window.addEventListener(
'mouseup',
()=>{
    dragging = false;
});

window.addEventListener(
'mousemove',
e=>{

    if(!dragging) return;

    const rect =
        previewCanvas
        .getBoundingClientRect();

    const mx =
        e.clientX - rect.left;

    const my =
        e.clientY - rect.top;

    const cx =
        previewCanvas.width/2;

    const cy =
        previewCanvas.height/2;

    let b =
        tank.barrels[selectedBarrel];

    b.x =
        Math.round(mx - cx);

    b.y =
        Math.round(my - cy);

    loadEditor();
    refreshBarrelList();
});

previewCanvas.addEventListener(
'wheel',
e=>{

    e.preventDefault();

    let b =
        tank.barrels[selectedBarrel];

    b.angle +=
        e.deltaY * 0.0025;

    loadEditor();
    refreshBarrelList();

},
{passive:false});

function loop(){

    drawTank();

    requestAnimationFrame(loop);
}

refreshBarrelList();

loadEditor();

loop();
</script>

</body>
</html>
